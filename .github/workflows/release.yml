name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - {goos: linux, goarch: amd64}
          - {goos: linux, goarch: arm64}
          - {goos: darwin, goarch: arm64}
          - {goos: windows, goarch: amd64}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          out=mcpc-${{ matrix.goos }}-${{ matrix.goarch }}
          [ "${{ matrix.goos }}" = "windows" ] && out=$out.exe
          go build -ldflags "-s -w -X github.com/adam-eques/mcpc/internal/version.Version=${GITHUB_REF_NAME}" -o "$out" ./cmd/mcpc
      - uses: actions/upload-artifact@v4
        with:
          name: mcpc-${{ matrix.goos }}-${{ matrix.goarch }}
          path: mcpc-*
